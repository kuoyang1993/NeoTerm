<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NeoTerm</title>
<style>
*{box-sizing:border-box;font-family:微软雅黑;margin:0;padding:0}
body{display:flex;height:100vh;background:#1a1a1a;color:#eee;overflow:hidden}

/* 左侧面板：两大主按钮 */
.left{width:320px;background:#222;padding:12px;border-right:1px solid #444;display:flex;flex-direction:column;gap:12px;height:100%}
.main-btn{width:100%;height:65px;font-size:18px;background:#0066cc;color:#fff;border:none;border-radius:6px;cursor:pointer}
.main-btn:hover{background:#0077ee}

/* 弹窗容器 */
.panel{flex:1;margin-top:10px;display:none;flex-direction:column;gap:8px;height:calc(100% - 140px)}
.panel.active{display:flex}

.form-item{margin:8px 0}
input{width:100%;padding:6px;background:#333;color:#fff;border:1px solid #555;margin-top:4px}
button{width:100%;padding:8px;margin-top:8px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer}
.section{margin-bottom:15px}
h4{margin-bottom:8px;color:#4af}

/* 重点修复：文件列表撑满剩余高度，可完整滚动 */
#fileList{
  flex:1;
  background:#2a2a2a;
  padding:8px;
  overflow-y:auto;
  border:1px solid #444;
  min-height:0; /* 解决滚动拉不动 */
}
.file-item{padding:6px 8px;margin:2px 0;background:#333;cursor:pointer;border-radius:2px}
.file-item:hover{background:#444}
.folder{color:#4af;}
#rightMenu{position:fixed;width:160px;background:#222;border:1px solid #555;padding:4px;display:none;z-index:9999;user-select:none}
#rightMenu div{padding:6px 10px;cursor:pointer}
#rightMenu div:hover{background:#444}
#fileInput{display:none}
#backBtn{background:#444;margin-bottom:8px}
#uploadBtn{margin:8px 0;}

/* 右侧终端 */
.main{flex:1;display:flex;flex-direction:column;padding:12px;height:100%}
#output{flex:1;background:#000;padding:10px;overflow:auto;white-space:pre-wrap;margin-bottom:10px;border:1px solid #333}
#cmd{width:100%;padding:8px;background:#222;color:#fff;border:1px solid #444}
</style>
</head>
<body>
<div class="left">
  <!-- 两个大主按钮 -->
  <button class="main-btn" onclick="showSSH()">+ 新建连接</button>
  <button class="main-btn" onclick="showFile()">📁 文件传输</button>

  <!-- SSH连接面板 -->
  <div id="sshPanel" class="panel">
    <div class="section">
      <h4>SSH连接</h4>
      <div class="form-item"><label>名字</label><input id="name"></div>
      <div class="form-item"><label>主机</label><input id="ip" placeholder="192.168.x.x"></div>
      <div class="form-item"><label>端口</label><input id="port" value="22"></div>
      <div class="form-item"><label>用户</label><input id="user" value="root"></div>
      <div class="form-item"><label>密码</label><input id="pwd" type="password"></div>
      <button onclick="connect()">🔗 连接</button>
    </div>
  </div>

  <!-- 文件管理面板（重点修复高度） -->
  <div id="filePanel" class="panel">
    <h4>文件管理器</h4>
    <button id="backBtn" onclick="goBack()">⬆ 返回上级目录</button>
    <button id="uploadBtn" onclick="openUploadDir()">📤 上传到当前目录</button>
    <button onclick="newFolder()">新建文件夹</button>
    <button onclick="setLockPwd()">🔐 设置/修改锁屏密码</button>
    <button onclick="clearLockPwd()">❌ 关闭自动锁屏</button>
    <div class="form-item">
      <input id="curDir" value="/root/python">
      <button onclick="loadFiles()">刷新</button>
    </div>
    <div id="fileList"></div>
  </div>
</div>

<div class="main">
  <div id="output"></div>
  <input id="cmd" placeholder="输入命令回车执行" onkeydown="if(event.key==='Enter')sendCmd()">
</div>

<div id="rightMenu">
  <div onclick="openUpload()">📤 上传</div>
  <div onclick="newFolder()">📁 新建文件夹</div>
  <div onclick="downloadFile()">📥 下载</div>
  <div onclick="renameFile()">✏️ 重命名</div>
  <div onclick="delFile()">🗑️ 删除</div>
</div>
<input type="file" id="fileInput">

<script>
const output = document.getElementById('output')
const menu = document.getElementById('rightMenu')
const fileInput = document.getElementById('fileInput')
const curDir = document.getElementById('curDir')
const cmd = document.getElementById('cmd')
const sshPanel = document.getElementById('sshPanel')
const filePanel = document.getElementById('filePanel')
let selectedFile = ""
let curPath = "/root/python"

// 切换面板
function showSSH(){
  sshPanel.classList.add('active')
  filePanel.classList.remove('active')
}
function showFile(){
  sshPanel.classList.remove('active')
  filePanel.classList.add('active')
}

// 连接SSH
async function connect(){
	const res = await window.go.main.App.Connect({
		name:name.value, ip:ip.value, port:port.value, user:user.value, pwd:pwd.value
	})
	output.innerText += res + "\n"
  output.scrollTop = output.scrollHeight
	loadFiles()
}
// 发送命令
async function sendCmd(){
	const c = cmd.value.trim();
	if(!c) return
	output.innerText += "> " + c + "\n"
	const res = await window.go.main.App.SendCmd(c)
	output.innerText += res + "\n"
	cmd.value = ""
	output.scrollTop = output.scrollHeight
}
// 进入文件夹
function enterFolder(folderName){
  curPath = curPath === '/' ? `/${folderName}` : `${curPath}/${folderName}`
  curDir.value = curPath
  loadFiles()
}
// 返回上级
function goBack(){
  const arr = curPath.split("/").filter(Boolean)
  arr.pop()
  curPath = arr.length ? '/' + arr.join('/') : '/'
  curDir.value = curPath
  loadFiles()
}
// 加载文件列表
async function loadFiles(){
	curPath = curDir.value
	const list = await window.go.main.App.ListDir(curPath)
	let html = ""
	list.forEach(f=>{
    const isFolder = !f.includes('.')
    const cls = isFolder ? "file-item folder" : "file-item"
    const dblClick = isFolder ? `ondblclick="enterFolder('${f}')"` : ""
		html += `<div class="${cls}" ${dblClick} oncontextmenu="showMenu(event,'${curPath}/${f}')">${f}</div>`
	})
	fileList.innerHTML = html
}
// 右键菜单
function showMenu(e,path){
  e.preventDefault();
  e.stopPropagation();
	selectedFile = path
	menu.style.display = "block"
	let x = e.clientX + 5
	let y = e.clientY + 5
	const winW = window.innerWidth
	const winH = window.innerHeight
	const menuW = 160
	const menuH = 200
	if(x + menuW > winW) x = e.clientX - menuW - 5
	if(y + menuH > winH) y = e.clientY - menuH - 5
	menu.style.left = x + "px"
	menu.style.top = y + "px"
}
document.addEventListener('click', () => {
  menu.style.display = "none"
})
// 上传文件
async function uploadByFile(file, remotePath){
  return new Promise((resolve)=>{
    const reader = new FileReader()
    reader.onload = async e=>{
      const data = new Uint8Array(e.target.result)
      const res = await window.go.main.App.UploadFileBin(remotePath, Array.from(data))
      output.innerText += res + "\n"
      loadFiles()
      resolve()
    }
    reader.readAsArrayBuffer(file)
  })
}
async function openUploadDir(){
	menu.style.display = "none"
  fileInput.onchange = async e=>{
    const f = e.target.files[0]
    if(!f)return
    await uploadByFile(f, curPath+"/"+f.name)
    fileInput.value=""
  }
	fileInput.click()
}
async function openUpload(){
	menu.style.display = "none"
  fileInput.onchange = async e=>{
    const f = e.target.files[0]
    if(!f)return
    await uploadByFile(f, selectedFile)
    fileInput.value=""
  }
	fileInput.click()
}
async function newFolder(){
	menu.style.display = "none"
	const name = prompt("输入文件夹名")
	if(!name)return
	const res = await window.go.main.App.Mkdir(curPath + "/" + name)
	output.innerText += res + "\n"
	loadFiles()
}
async function downloadFile(){
	menu.style.display = "none"
	if(!selectedFile)return
	const fn = selectedFile.split('/').pop()
	const savePath = await window.go.main.App.SaveFileDialog(fn)
	if(!savePath)return
	const res = await window.go.main.App.DownloadFile(selectedFile, savePath)
	output.innerText += res + "\n"
  output.scrollTop = output.scrollHeight
}
async function renameFile(){
	menu.style.display = "none"
	const old = selectedFile
	const newName = prompt("输入新名称", old.split('/').pop())
	if(!newName)return
	const newPath = curPath + "/" + newName
	const res = await window.go.main.App.RenameFile(old, newPath)
	output.innerText += res + "\n"
	loadFiles()
}
async function delFile(){
	menu.style.display = "none"
	if(!confirm("确定删除？"))return
	const res = await window.go.main.App.RemoveFile(selectedFile)
	output.innerText += res + "\n"
	loadFiles()
}
// 锁屏功能（原样保留）
let lockPwd = "";
const lockTime = 5 * 60 * 1000;
let lockTimer;
function resetLockTimer(){
  clearTimeout(lockTimer);
  if(lockPwd){
    lockTimer = setTimeout(()=>{
      document.getElementById("lockScreen").style.display = "flex";
    }, lockTime);
  }
}
function setLockPwd(){
  let newPwd = prompt("设置锁屏密码（至少8位）：");
  if(newPwd === null) return;
  if(newPwd.length < 8){
    alert("密码至少8位！");
    return;
  }
  lockPwd = newPwd;
  alert("密码设置成功，5分钟无操作自动锁屏");
  resetLockTimer();
}
function clearLockPwd(){
  lockPwd = "";
  clearTimeout(lockTimer);
  alert("已关闭自动锁屏");
  document.getElementById("lockScreen").style.display = "none";
}
function unlockApp(){
  const input = document.getElementById("lockPwd").value;
  if(input === lockPwd){
    document.getElementById("lockScreen").style.display = "none";
    resetLockTimer();
    document.getElementById("lockPwd").value = "";
  }else{
    alert("密码错误");
  }
}
window.onmousemove = resetLockTimer;
window.onkeydown = resetLockTimer;
</script>
<!-- 锁屏弹窗 -->
<div id="lockScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:99999;flex-direction:column;align-items:center;justify-content:center;color:#fff">
  <h2>软件已锁定</h2>
  <input type="password" id="lockPwd" placeholder="输入密码" style="padding:10px;font-size:16px;margin:10px;width:240px">
  <button onclick="unlockApp()" style="padding:10px 20px">解锁</button>
</div>
</body>
</html>
